<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Personal website and online resume of Ing. Fabian Steiner BSc., Automation Consultant.">
  <meta name="author" content="Fabian Steiner">
  <title>Ing. Fabian Steiner BSc.</title>
  <link rel="icon" type="image/png" href="/img/fabian_steiner.png">

  <!-- Send visitors to their language: stored choice, else browser language, else English. -->
  <script>
    (function () {
      try {
        var stored = localStorage.getItem("lang");
        var lang =
          stored === "de" || stored === "en"
            ? stored
            : (navigator.language || "en").toLowerCase().indexOf("de") === 0
              ? "de"
              : "en";
        location.replace("/" + lang + "/");
      } catch (e) {
        location.replace("/en/");
      }
    })();
  </script>
  <meta http-equiv="refresh" content="0; url=/en/">
  <link rel="alternate" hreflang="en" href="https://fabian.stei-ner.net/en/">
  <link rel="alternate" hreflang="de" href="https://fabian.stei-ner.net/de/">
</head>

<body>
  <noscript>
    <p>Choose a language: <a href="/en/">English</a> &middot; <a href="/de/">Deutsch</a></p>
  </noscript>
</body>

</html>
